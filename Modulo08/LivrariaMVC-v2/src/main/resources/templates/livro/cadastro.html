<!DOCTYPE html>
<html layout:decorate="~{layout}">

<head>
	<meta charset="UTF-8" />
</head>

<body>

	<section class="layout-content" layout:fragment="corpo">

		<nav class="navbar navbar-expand-md bg-light">
			<div class="container-fluid">
				<div class="collapse navbar-collapse" id="navbarsExampleDefault">
					<ul class="navbar-nav mr-auto">
						<li class="nav-item active"><i class="bi bi-caret-right-fill"></i>
							<span th:text="#{livro.cadastrar.label}"></span>
						</li>
					</ul>
					<a class="btn btn-primary btn-md nav-item ms-auto" th:href="@{/livro/listar}" role="button"> <span
							class="bi bi-list-ul" title="Cadastro" aria-hidden="true"></span> <span
							th:text="#{livro.listar.label}"></span>
					</a>
				</div>
			</div>
		</nav>

		<div class="container" id="cadastro">

			<div th:replace="~{fragments/alert}"></div>

			<form th:action="${livro.id == null} ? @{/livro/salvar} : @{/livro/editar}" th:object="${livro}"
				method="POST">

				<div class="row">
					<div class="col-md-6">
						<label th:text="#{livro.titulo.label}" for="nome"></label>
						<input type="text" class="form-control" id="nome" th:placeholder="#{livro.titulo.label}"
							autofocus="autofocus" th:field="*{titulo}"
							th:classappend="${#fields.hasErrors('titulo')} ? is-invalid" />

						<div class="invalid-feedback">
							<span th:errors="*{titulo}"></span>
						</div>
					</div>

					<div class="col-md-6">
						<label th:text="#{livro.autor.label}" for="nome"></label>
						<input type="text" class="form-control" id="nome" th:placeholder="#{livro.autor.label}"
							autofocus="autofocus" th:field="*{autor}"
							th:classappend="${#fields.hasErrors('autor')} ? is-invalid" />

						<div class="invalid-feedback">
							<span th:errors="*{autor}"></span>
						</div>
					</div>

					<div class="col-md-6 mt-3">
						<label th:text="#{livro.editora.label}" for="editora"></label>
						<select id="editora" class="form-select" th:field="*{editora}"
							th:classappend="${#fields.hasErrors('editora')} ? is-invalid">
							<option th:text="#{select.label}" value="">Selecione</option>
							<option th:each="editora : ${editoras}" th:value="${editora.id}" th:text="${editora.nome}">
							</option>
						</select>

						<div class="invalid-feedback">
							<span th:errors="*{editora}"></span>
						</div>
					</div>

					<div class="col-md-6 mt-3">
						<label th:text="#{livro.ano.label}" for="ano"></label>
						<input type="number" class="form-control" id="nome" th:placeholder="#{livro.ano.label}"
							autofocus="autofocus" th:field="*{ano}"
							th:classappend="${#fields.hasErrors('ano')} ? is-invalid" />

						<div class="invalid-feedback">
							<span th:errors="*{ano}"></span>
						</div>
					</div>

					<div class="col-md-6 mt-3">
						<label th:text="#{livro.preco.label}" for="preco"></label>
						<input type="text" class="form-control" id="preco" th:placeholder="#{livro.preco.label}"
							data-mask="000000,00" data-mask-reverse="true" th:field="*{preco}"
							th:classappend="${#fields.hasErrors('preco')} ? is-invalid" />

						<div class="invalid-feedback">
							<span th:errors="*{preco}"></span>
						</div>
					</div>
				</div>

				<input type="hidden" id="id" th:field="*{id}" />
				<button type="submit" th:text="#{button.salvar.label}" class="btn btn-primary btn-sm mt-3"></button>
			</form>
		</div>
	</section>
</body>

</html>
