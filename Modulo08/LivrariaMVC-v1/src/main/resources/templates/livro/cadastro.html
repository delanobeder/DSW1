<!DOCTYPE html>
<html layout:decorate="~{layout}">

<head>
	<meta charset="UTF-8" />
</head>

<body>

	<section class="layout-content" layout:fragment="corpo">

		<nav class="navbar navbar-expand-md bg-light">
			<div class="container-fluid">
				<div class="collapse navbar-collapse" id="navbarsExampleDefault">
					<ul class="navbar-nav mr-auto">
						<li class="nav-item active"><i class="bi bi-caret-right-fill"></i>
							<span>Cadastrar Livros</span>
						</li>
					</ul>

					<a class="btn btn-primary btn-md nav-item ms-auto" th:href="@{/livro/listar}" role="button"> <span
							class="bi bi-list-ul" title="Cadastro" aria-hidden="true"></span> <span>Listar Livros</span>
					</a>
				</div>
			</div>
		</nav>

		<div class="container" id="cadastro">

			<div th:replace="~{fragments/alert}"></div>

			<form th:action="${livro.id == null} ? @{/livro/salvar} : @{/livro/editar}" th:object="${livro}"
				method="POST">

				<div class="row">
					<div class="col-md-6">
						<label for="nome">Título</label>
						<input type="text" class="form-control" id="nome" placeholder="Título" autofocus="autofocus"
							th:field="*{titulo}" th:classappend="${#fields.hasErrors('titulo')} ? is-invalid" />

						<div class="invalid-feedback">
							<span th:errors="*{titulo}"></span>
						</div>
					</div>

					<div class="col-md-6">
						<label for="nome">Autor</label>
						<input type="text" class="form-control" id="nome" placeholder="Autor" autofocus="autofocus"
							th:field="*{autor}" th:classappend="${#fields.hasErrors('autor')} ? is-invalid" />

						<div class="invalid-feedback">
							<span th:errors="*{autor}"></span>
						</div>
					</div>

					<div class="col-md-6 mt-3">
						<label for="editora">Editora</label>
						<select id="editora" class="form-select" th:field="*{editora}"
							th:classappend="${#fields.hasErrors('editora')} ? is-invalid">
							<option value="">Selecione</option>
							<option th:each="editora : ${editoras}" th:value="${editora.id}" th:text="${editora.nome}">
							</option>
						</select>

						<div class="invalid-feedback">
							<span th:errors="*{editora}"></span>
						</div>
					</div>

					<div class="col-md-6 mt-3">
						<label for="nome">Ano</label>
						<input type="number" class="form-control" id="nome" placeholder="Ano" autofocus="autofocus"
							th:field="*{ano}" th:classappend="${#fields.hasErrors('ano')} ? is-invalid" />

						<div class="invalid-feedback">
							<span th:errors="*{ano}"></span>
						</div>
					</div>

					<div class="col-md-6 mt-3">
						<label for="preco">Preço</label>
						<input type="text" class="form-control" id="preco" placeholder="Preço" data-mask="000000,00"
							data-mask-reverse="true" th:field="*{preco}"
							th:classappend="${#fields.hasErrors('preco')} ? is-invalid" />

						<div class="invalid-feedback">
							<span th:errors="*{preco}"></span>
						</div>
					</div>
				</div>
				<input type="hidden" id="id" th:field="*{id}" />
				<button type="submit" class="btn btn-primary btn-sm mt-3">Salvar</button>
			</form>
		</div>
	</section>
</body>

</html>
