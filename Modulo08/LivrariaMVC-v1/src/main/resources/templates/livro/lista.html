<!DOCTYPE html>
<html layout:decorate="~{layout}">

<head>
	<meta charset="UTF-8" />
</head>

<body>
	<section class="layout-content" layout:fragment="corpo">

		<nav class="navbar navbar-expand-md bg-light">
			<div class="container-fluid">
				<div class="collapse navbar-collapse" id="navbarsExampleDefault">
					<ul class="navbar-nav mr-auto">
						<li class="nav-item active">
							<i class="bi bi-caret-right-fill"></i>
							<span>Lista de Livros</span>
						</li>
					</ul>
					<a class="btn btn-primary btn-md nav-item ms-auto" th:href="@{/livro/cadastrar}" role="button">
						<span class="bi bi-plus-circle-fill" title="Cadastro" aria-hidden="true"></span>
						<span>Novo Livro</span>
					</a>
				</div>
			</div>
		</nav>

		<div class="container" id="listagem">

			<div th:replace="~{fragments/alert}"></div>

			<div class="table-responsive">
				<table class="table table-striped table-hover table-sm">
					<thead>
						<tr>
							<th>#</th>
							<th>Título</th>
							<th>Autor</th>
							<th>Editora</th>
							<th>Ano</th>
							<th>Preço</th>
							<th>Ação</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="livro : ${livros}">
							<td th:text="${livro.id}"></td>
							<td th:text="${livro.titulo}"></td>
							<td th:text="${livro.autor}"></td>
							<td th:text="${livro.editora.nome}"></td>
							<td th:text="${livro.ano}"></td>
							<td th:text="|R$ ${#numbers.formatDecimal(livro.preco,2,2,'COMMA')}|"></td>
							<td colspan="2">
								<a class="btn btn-info btn-sm" th:href="@{/livro/editar/{id} (id=${livro.id}) }"
									role="button">
									<span class="bi bi-pen" title="Editar" aria-hidden="true"></span>
								</a>
								<button th:id="${#strings.concat('btn_livro/excluir/',livro.id)}" type="button"
									class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#myModal">
									<span class="bi bi-trash" title="Excluir" aria-hidden="true"></span>
								</button>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<div th:replace="~{fragments/modal::modal}"></div>
	</section>
</body>

</html>
