<!DOCTYPE html>
<html layout:decorate="~{layout}">

<head>
	<meta charset="UTF-8" />
</head>

<body>
	<section class="layout-content" layout:fragment="corpo">

		<nav class="navbar navbar-expand-md bg-light">
			<div class="container-fluid">
				<div class="collapse navbar-collapse" id="navbarsExampleDefault">
					<ul class="navbar-nav">
						<li class="nav-item active">
							<i class="bi bi-caret-right-fill"></i>
							<span th:text="#{editora.listar.label}"></span>
						</li>
					</ul>
					<a class="btn btn-primary btn-md nav-item ms-auto" th:href="@{/editora/cadastrar}" role="button">
						<span class="bi bi-plus-circle-fill" title="Cadastro" aria-hidden="true"></span>
						<span th:text="#{editora.cadastrar.label}"></span>
					</a>
				</div>
			</div>
		</nav>

		<div class="container" id="listagem">

			<div th:replace="~{fragments/alert}"></div>

			<div class="table-responsive">
				<table class="table table-striped table-hover table-sm">
					<thead>
						<tr>
							<th>#</th>
							<th th:text="#{editora.cnpj.label}"></th>
							<th th:text="#{editora.nome.label}"></th>
							<th th:text="#{acao.label}"></th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="editora : ${editoras}">
							<td th:text="${editora.id}"></td>
							<td th:text="${editora.CNPJ}"></td>
							<td th:text="${editora.nome}"></td>
							<td colspan="2">
								<a class="btn btn-info btn-sm" th:href="@{/editora/editar/{id} (id=${editora.id}) }"
									role="button">
									<span class="bi bi-pen" th:title="#{link.editar.label}" aria-hidden="true"> </span>
								</a>
								<button th:id="${'btn_editora/excluir/' + editora.id}" type="button"
									class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#myModal">
									<span class="bi bi-trash" th:title="#{link.excluir.label}"
										aria-hidden="true"></span>
								</button>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<div th:replace="~{fragments/modal::modal}"></div>
	</section>
</body>

</html>
