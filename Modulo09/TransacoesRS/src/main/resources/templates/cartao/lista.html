<!DOCTYPE html>
<html layout:decorate="~{layout}">

<head>
	<meta charset="UTF-8" />
</head>

<body>
	<section class="layout-content" layout:fragment="corpo">

		<nav class="navbar navbar-expand-md bg-light">
			<div class="container-fluid">
				<div class="collapse navbar-collapse" id="navbarsExampleDefault">
					<ul class="navbar-nav">
						<li class="nav-item active">
							<i class="bi bi-caret-right-fill"></i>
							<span>Lista de Cartões</span>
						</li>
					</ul>
					<a class="btn btn-primary btn-md nav-item ms-auto" th:href="@{/cartao/cadastrar}" role="button">
						<span class="bi bi-plus-circle-fill" title="Cadastro" aria-hidden="true"></span>
						<span>Novo Cartão</span>
					</a>
				</div>
			</div>
		</nav>

		<div class="container" id="listagem">

			<div th:replace="~{fragments/alert}"></div>

			<div class="table-responsive">
				<table class="table table-striped table-hover table-sm">
					<thead>
						<tr>
							<th>#</th>
							<th>Titular</th>
							<th>CPF</th>
							<th>Número</th>
							<th>Vencimento</th>
							<th>CVV</th>
							<th>Ação</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="cartao : ${cartoes}">
							<td th:text="${cartao.id}"></td>
							<td th:text="${cartao.titular}"></td>
							<td th:text="${cartao.CPF}"></td>
							<td th:text="${cartao.numero}"></td>
							<td th:text="${cartao.vencimento}"></td>
							<td th:text="${cartao.CVV}"></td>
							<td colspan="2">
								<a class="btn btn-info btn-sm" th:href="@{/cartao/editar/{id} (id=${cartao.id}) }"
									role="button">
									<span class="bi bi-pen" title="Editar" aria-hidden="true"> </span>
								</a>
								<button th:id="${'btn_cartao/excluir/' + cartao.id}" type="button"
									class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#myModal">
									<span class="bi bi-trash" title="Excluir" aria-hidden="true"></span>
								</button>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<div th:replace="~{fragments/modal::modal}"></div>
	</section>
</body>

</html>
