<!DOCTYPE html>
<html layout:decorate="~{layout}">

<head>
	<meta charset="UTF-8" />
</head>

<body>
	<section class="layout-content" layout:fragment="corpo">

		<nav class="navbar navbar-expand-md bg-light">
			<div class="container-fluid">
				<div class="collapse navbar-collapse" id="navbarsExampleDefault">
					<ul class="navbar-nav mr-auto">
						<li class="nav-item active">
							<i class="bi bi-caret-right-fill"></i>
							<span>Lista de Cidades</span>
						</li>
					</ul>
					<a class="btn btn-primary btn-md nav-item ms-auto" th:href="@{/cidade/cadastrar}" role="button">
						<span class="bi bi-plus-circle-fill" title="Cadastro" aria-hidden="true"></span>
						<span>Nova Cidade</span>
					</a>
				</div>
			</div>
		</nav>

		<div class="container overflow-auto" style="max-width: 100%;max-height: 750px;" id="listagem">

			<div th:replace="~{fragments/alert}"></div>

			<div class="table-responsive">
				<table class="table table-striped table-hover table-sm">
					<thead>
						<tr>
							<th>#</th>
							<th>Nome</th>
							<th>Estado</th>
							<th>Ação</th>
						</tr>
					</thead>
					<tbody>
						<tr th:each="cidade : ${cidades}">
							<td th:text="${cidade.id}"></td>
							<td th:text="${cidade.nome}"></td>
							<td th:text="${cidade.estado.sigla}"></td>
							<td colspan="2">
								<a class="btn btn-info btn-sm" th:href="@{/cidade/editar/{id} (id=${cidade.id}) }"
									role="button">
									<span class="bi bi-pen" title="Editar" aria-hidden="true"></span>
								</a>
								<button th:id="${#strings.concat('btn_cidade/excluir/',cidade.id)}" type="button"
									class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#myModal">
									<span class="bi bi-trash" title="Excluir" aria-hidden="true"></span>
								</button>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

		<div th:replace="~{fragments/modal::modal}"></div>
	</section>
</body>

</html>
