services:
  mysql:
    image: mysql:5.6.36
    restart: always
    container_name: mysql
    env_file:
      - .env
    volumes:
    - './db/MySQL:/tmp/db'
    command: mysqld --init-file="/tmp/db/create.sql" --max-connections=500 --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
  tomcat:
    build: .
    container_name: tomcat
    env_file:
      - .env    
    ports:
      - "8080:8080"
    depends_on:
      - mysql
